<body>
    <header>

                        <td>2020</td>
                        <td>R$ 55.900,00</td>

                        <td>
                            <div class="action-buttons">
                                <a href="detalhes_anuncio.html" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">Ver Detalhes</a>

                    </tr>
                    <tr>
                        <td><img src="../assets/images/vw_polo_1.jpg" alt="Polo" style="width: 80px; height: 50px; object-fit: cover; border-radius: 4px;"></td>

                                <a href="detalhes_anuncio.html" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.9rem;">Ver Detalhes</a>
