<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Anúncio - AutoPortal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="dashboard.html" class="logo">AutoPortal <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: normal;">| Painel</span></a>
            <div class="nav-links">
                <a href="dashboard.html">Resumo</a>
                <a href="meus_anuncios.html" style="color: var(--primary-color);">Meus Anúncios</a>
                <a href="interesses.html">Mensagens</a>
                <a href="../index.html" class="btn btn-secondary" style="color: white; padding: 0.4rem 0.8rem;">Sair</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="page-title" style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Cadastrar Novo Veículo</h2>
            <a href="meus_anuncios.html" class="btn btn-secondary">Cancelar</a>
        </div>

        <div class="container-box" style="max-width: 800px;">
            <form action="meus_anuncios.html" method="get">
                
                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Informações Básicas</h3>
                
                <div class="grid-container" style="gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label for="marca">Marca</label>
                        <select id="marca" class="form-control" required>
                            <option value="">Selecione...</option>
                            <option value="fiat">Fiat</option>
                            <option value="vw">Volkswagen</option>
                            <option value="chevrolet">Chevrolet</option>
                            <option value="ford">Ford</option>
                            <option value="honda">Honda</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label for="modelo">Modelo</label>
                        <input type="text" id="modelo" class="form-control" placeholder="Ex: Onix LT" required>
                    </div>
                </div>

                <div class="grid-container" style="gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label for="ano">Ano</label>
                        <input type="text" id="ano" class="form-control" placeholder="Ex: 2020/2021" required>
                    </div>
                    
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label for="cor">Cor</label>
                        <input type="text" id="cor" class="form-control" placeholder="Ex: Branco" required>
                    </div>

                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label for="km">Quilometragem</label>
                        <input type="number" id="km" class="form-control" placeholder="Ex: 45000" required>
                    </div>
                </div>

                <div class="grid-container" style="gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label for="estado">Estado de Uso</label>
                        <select id="estado" class="form-control" required>
                            <option value="usado">Usado</option>
                            <option value="novo">Novo (Zero KM)</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label for="cidade">Cidade / UF</label>
                        <input type="text" id="cidade" class="form-control" placeholder="Ex: São Paulo, SP" required>
                    </div>

                    <div class="form-group" style="flex: 1; min-width: 200px;">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" class="form-control" placeholder="Ex: 55000" step="0.01" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="descricao">Descrição Completa</label>
                    <textarea id="descricao" class="form-control" rows="5" placeholder="Descreva os detalhes, opcionais e estado de conservação do veículo..." required></textarea>
                </div>

                <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Fotos (Mínimo de 3)</h3>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="fotos">Selecione as imagens</label>
                    <input type="file" id="fotos" class="form-control" multiple accept="image/*" required>
                    <small style="color: var(--text-muted);">Envie pelo menos 3 fotos do veículo (Frente, Traseira e Interior).</small>
                </div>

                <div class="form-group" style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button type="reset" class="btn btn-secondary">Limpar Campos</button>
                    <button type="submit" class="btn btn-primary">Salvar Anúncio</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AutoPortal. Projeto Acadêmico UFU.</p>
    </footer>
</body>
</html>
