<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Interesse - AutoPortal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">AutoPortal</a>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="login.html">Login</a>
                <a href="cadastro.html" class="btn btn-primary" style="color: white;">Criar Conta</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="container-box" style="margin-top: 2rem;">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Registrar Interesse</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
                Você está interessado no veículo <strong>Chevrolet Onix LT 1.0 Flex - 2020</strong>.
            </p>

            <form action="detalhes.html" method="get">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000" required>
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" class="form-control" rows="4" placeholder="Olá, tenho interesse neste veículo e gostaria de mais informações..." required></textarea>
                </div>

                <div class="form-group" style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <a href="detalhes.html" class="btn btn-secondary" style="flex: 1;">Cancelar</a>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Enviar Interesse</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AutoPortal. Projeto Acadêmico UFU.</p>
    </footer>
</body>
</html>
