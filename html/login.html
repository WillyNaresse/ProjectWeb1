<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoPortal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">AutoPortal</a>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="login.html" style="color: var(--primary-color);">Login</a>
                <a href="cadastro.html" class="btn btn-primary" style="color: white;">Criar Conta</a>
            </div>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center;">
        <div class="container-box" style="width: 100%; max-width: 450px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Acesse sua Conta</h2>
            
            <form action="dashboard.html" method="get">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="Seu e-mail" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Sua senha" required>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AutoPortal. Projeto Acadêmico UFU.</p>
    </footer>
</body>
</html>
