<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AutoPortal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="logo">AutoPortal</a>
            <div class="nav-links">
                <a href="../index.html">Início</a>
                <a href="login.html">Login</a>
                <a href="cadastro.html" class="btn btn-primary" style="color: white;">Criar Conta</a>
            </div>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; padding: 2rem 5%;">
        <div class="container-box" style="width: 100%; max-width: 500px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Crie sua Conta</h2>
            
            <form action="login.html" method="get">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="form-control" placeholder="(00) 00000-0000" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="Seu e-mail" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Crie uma senha" required>
                </div>

                <div class="form-group">
                    <label for="senhaConfirm">Confirme sua senha</label>
                    <input type="password" id="senhaConfirm" class="form-control" placeholder="Confirme sua senha" required>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Finalizar Cadastro</button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>Já possui uma conta? <a href="login.html">Faça Login</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AutoPortal. Projeto Acadêmico UFU.</p>
    </footer>
</body>
</html>
